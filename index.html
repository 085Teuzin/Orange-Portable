<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Orange Portable - Made By: @085_Teuzinnn</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <meta name="theme-color" content="#000000">
        <style>
            :root { --p:#ffA500; --c:#ffffff; }
            .hide-scroll { -ms-overflow-style:none; scrollbar-width:none; }
            .hide-scroll::-webkit-scrollbar { display:none; }
            .cat-selected { background-color:var(--p)!important;color:var(--c)!important;border-color:var(--p)!important;font-weight:bold; }
            .modal-open { overflow:hidden; }
            .option-card:active { background-color:#ffA500; color:white; }
            .btn-transition { transition: all 0.3s ease; }
            #loading-screen { position: fixed; inset: 0; background: black; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
            .loader { width: 48px; height: 48px; border: 5px solid #111; border-bottom-color: #ffA500; border-radius: 50%; display: inline-block; box-sizing: border-box; animation: rotation 1s linear infinite; margin: 20px 0; }
            @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        </style>
    </head>
    <body class="bg-black text-white flex flex-col min-h-screen">
        <div id="loading-screen">
            <h1 class="text-4xl font-black text-[#ffA500] tracking-tighter italic">Orange Portable</h1>
            <span id="load-box" class="loader"></span>
            <p id="load-msg" class="text-zinc-500 tracking-widest text-sm">Carregando...</p>
        </div>
        <div id="app-content" class="w-full flex flex-col p-4 md:p-8 text-center opacity-0 transition-opacity duration-500">
            <header class="mb-6">
                <h1 id="main-title" class="text-4xl font-black text-[#ffA500] tracking-tighter italic">Orange Portable</h1>
                <h2 id="sub-title" class="text-sm tracking-widest opacity-50 mt-1">Games CSO for PPSSPP</h2>
                <span class="inline-block mt-2 px-2 py-0.5 bg-zinc-900 border border-zinc-800 text-[#ffA500] text-[9px] font-bold rounded-md uppercase tracking-widest">v1.1</span>
            </header>
            <section class="sticky top-0 z-40 bg-black/80 backdrop-blur-md pb-4 text-left flex gap-2">
                <input type="text" id="s" placeholder="🔍 Buscar jogo..." class="flex-grow bg-[#111] border border-zinc-800 p-4 rounded-xl outline-none text-lg focus:border-[#ffA500]">
                <button id="openSort" class="bg-[#111] border border-zinc-800 px-4 rounded-xl text-xl btn-transition">
                    <span id="currentSortIcon">🔠</span>
                </button>
            </section>
            <nav id="ts" class="flex gap-2 overflow-x-auto hide-scroll pb-4 mb-4"></nav>
            <button id="btn-rnd" class="w-full bg-[#111] border border-[#ffA500] text-[#ffA500] py-4 rounded-xl font-bold mb-3 active:scale-95 transition-transform italic tracking-widest">🎲 ME SURPREENDA!</button>
            <div id="ppsspp-card-container" class="mb-6"></div>
            <main id="ct" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3 flex-grow text-left"></main>
            <div id="pagination" class="flex justify-center gap-2 mt-6"></div>
            <section class="mt-12 p-6 bg-zinc-950 border border-zinc-900 rounded-3xl">
                <div class="grid grid-cols-2 gap-3">
                    <button id="pix" class="bg-[#22c55e] py-4 rounded-2xl font-bold text-white text-[10px] sm:text-xs btn-transition">🍊 Orange Pix</button>
                    <button id="openSOS" class="bg-[#22c55e] py-4 rounded-2xl font-bold text-white text-[10px] sm:text-xs">🍊 Orange SOS</button>
                </div>
            </section>
            <footer class="mt-10 mb-20 text-gray-500 text-sm">
                <p class="font-semibold italic">Made By: @085_Teuzinnn</p>
                <p class="mt-2 opacity-70">© 2026 - All Rights Reserved</p>
            </footer>
            <button id="up" class="fixed bottom-6 right-6 w-12 h-12 rounded-full hidden z-50 text-xl items-center justify-center bg-zinc-900 border border-zinc-800 shadow-xl">🆙️</button>
        </div>
        <div id="md" class="fixed inset-0 z-[60] bg-black/95 hidden items-center justify-center p-4">
            <div class="bg-[#111] border border-[#ffA500] w-full max-w-md p-8 rounded-3xl relative">
                <button id="closeMd" class="absolute top-4 right-4 text-zinc-500 text-xl p-2">✕</button>
                <h2 id="mt" class="text-2xl font-bold text-[#ffA500] mb-4 pr-6"></h2>
                <div class="flex gap-3 mb-4"><span id="mdTime" class="text-[10px] bg-zinc-800 px-2 py-1 rounded font-bold"></span><span id="mrl" class="text-zinc-400 text-[10px] font-bold pt-1"></span></div>
                <p id="mds" class="text-zinc-400 text-sm leading-relaxed mb-6"></p>
                <div class="flex items-center justify-between pt-4 border-t border-zinc-800">
                    <span id="mcp" class="text-[10px] font-black border px-2 py-0.5 rounded tracking-tighter"></span>
                    <div class="flex gap-4 items-center">
                        <button id="mdFav" class="text-2xl active:scale-90 transition-transform"></button>
                        <a id="mdl" href="#" target="_blank" class="text-3xl">📥</a>
                    </div>
                </div>
            </div>
        </div>
        <div id="modalGeneric" class="fixed inset-0 z-[70] bg-black/95 hidden items-center justify-center p-4">
            <div class="bg-[#111] border border-zinc-800 w-full max-w-md max-h-[80vh] flex flex-col rounded-3xl relative overflow-hidden">
                <div class="p-6 border-b border-zinc-800 flex justify-between items-center bg-[#111]">
                    <h2 id="genericTitle" class="text-xl font-bold text-[#ffA500]"></h2>
                    <button id="closeGeneric" class="text-zinc-500 text-xl">✕</button>
                </div>
                <div id="genericSearchContainer" class="p-4 border-b border-zinc-800 hidden">
                    <input type="text" id="genericSearch" placeholder="Procurar..." class="w-full bg-zinc-900 border border-zinc-800 p-3 rounded-xl outline-none focus:border-[#ffA500]">
                </div>
                <div id="genericContent" class="overflow-y-auto p-4 space-y-2"></div>
            </div>
        </div>
        <script src="database.js"></script>
        <script src="infobase.js"></script>
        <script>
            const instaUrl = "https://www.instagram.com/085_teuzinnn?igsh=ZGJqaHBoMHliZGNw";
            const pixKey = "00020126360014br.gov.bcb.pix0114+55859912721255204000053039865802BR5925MATEUS VINICIUS DO NASCIM6009Sao Paulo62290525REC69FB573E7D2AC673791518630415AB";
            const ppssppStaticData = { name: "PPSSPP", size: "20-80 MB", link: "https://www.ppsspp.org/download/" };
            const ppssppStaticInfo = { description: "O melhor emulador de PSP para Android e PC.", release: "01/11/2012", compat: "Perfeito", playtime: "Infinito", lang: "🌐" };
            const gs = (window.gamesData || []).filter(g => g && g.name);
            let fv = new Set();
            try { const s = JSON.parse(localStorage.getItem("fav")); if(Array.isArray(s)) fv = new Set(s); } catch(e){}
            let at="Todos", currentPage=1, perPage=20, ord="az", debounceTimer, currentModalGame = "";

            function pz(s) { 
                if(!s || typeof s !== "string") return 0; 
                const n = parseFloat(s.replace(",", ".")); 
                if (isNaN(n)) return 0;
                return s.toUpperCase().includes("GB") ? n * 1024 : n; 
            }

            function closeAllModals() { 
                const md = document.getElementById("md");
                const mg = document.getElementById("modalGeneric");
                if(md) md.style.display="none"; 
                if(mg) mg.style.display="none"; 
                document.body.classList.remove("modal-open");
                currentModalGame = "";
            }

            document.getElementById("closeMd").onclick = closeAllModals;
            document.getElementById("closeGeneric").onclick = closeAllModals;

            function openGeneric(title, items, showSearch = false) {
                const gt = document.getElementById("genericTitle");
                const gc = document.getElementById("genericContent");
                const gsCont = document.getElementById("genericSearchContainer");
                const gsInput = document.getElementById("genericSearch");
                if(!gt || !gc) return;
                gt.innerText = title;
                gsCont.style.display = showSearch ? "block" : "none";
                const renderItems = (filtered) => {
                    gc.innerHTML = "";
                    filtered.forEach(item => {
                        const b = document.createElement("button");
                        b.className = "w-full text-left p-4 rounded-2xl bg-zinc-900 border border-zinc-800 text-sm font-medium option-card transition-colors";
                        b.innerText = item.label;
                        b.onclick = () => { item.action(); };
                        gc.appendChild(b);
                    });
                };
                if(showSearch) {
                    gsInput.value = "";
                    gsInput.oninput = (e) => {
                        const val = e.target.value.toLowerCase();
                        renderItems(items.filter(i => i.label.toLowerCase().includes(val)));
                    };
                }
                renderItems(items);
                document.getElementById("modalGeneric").style.display = "flex";
                document.body.classList.add("modal-open");
            }

            document.getElementById("openSort").onclick = () => {
                const options = [
                    { label: "🔠 A-Z", icon: "🔠", action: "az" },
                    { label: "🔡 Z-A", icon: "🔡", action: "za" },
                    { label: "🇧🇷 Traduzidos", icon: "🇧🇷", action: "ptbr" },
                    { label: "📉 Menor Tamanho", icon: "📉", action: "sizeAsc" },
                    { label: "📈 Maior Tamanho", icon: "📈", action: "sizeDesc" }
                ];
                openGeneric("Organizar por:", options.map(opt => ({
                    label: opt.label,
                    action: () => {
                        ord = opt.action;
                        document.getElementById("currentSortIcon").innerText = opt.icon;
                        currentPage = 1;
                        render();
                        closeAllModals();
                    }
                })));
            };

            document.getElementById("openSOS").onclick = () => {
                const sosOptions = [
                    { label: "⚠️ Link Offline", action: () => window.open(instaUrl, "_blank") },
                    { label: "🆕 Pedir Jogo", action: () => window.open(instaUrl, "_blank") },
                    { label: "🪲 Reportar Bug", action: () => window.open(instaUrl, "_blank") },
                    { label: "🔃 Atualização", action: () => window.open(instaUrl, "_blank") },
                    { label: "🤝 Parceria", action: () => window.open(instaUrl, "_blank") },
                    { label: "🛠️ Instalação", action: () => window.open(instaUrl, "_blank") }
                ];
                openGeneric("🍊 Orange SOS:", sosOptions);
            };

            document.getElementById("pix").onclick = function() {
                const btn = this;
                const originalText = "🍊 Orange Pix";
                if (window.AndroidJS?.copiarPix) { 
                    window.AndroidJS.copiarPix(pixKey); 
                } else if (navigator.clipboard) { 
                    navigator.clipboard.writeText(pixKey).catch(() => {});
                }
                btn.innerText = "📋 Copiado!";
                btn.style.backgroundColor = "#16a34a";
                window.location.href = "picpay://";
                setTimeout(() => { btn.innerText = originalText; btn.style.backgroundColor = "#22c55e"; }, 1500);
            };

            function toggleFav(n) { 
                if(fv.has(n)) fv.delete(n); else fv.add(n); 
                localStorage.setItem("fav", JSON.stringify([...fv])); 
                if(currentModalGame === n) { 
                    const fBtn = document.getElementById("mdFav");
                    if(fBtn) fBtn.innerText = fv.has(n) ? "❤️" : "🤍"; 
                }
                initCategories(); 
                render(); 
            }

            function getFiltered() {
                const q = document.getElementById("s").value.toLowerCase();
                let res = gs.filter(g => g.name && g.name.toLowerCase().includes(q) && (at==="Todos" || (at==="❤️ Favoritos" ? fv.has(g.name) : g.category===at)));
                if(ord==="ptbr") {
                    res = res.filter(g => {
                        const i = window.gamesInfo && window.gamesInfo[g.name];
                        return i && i.lang && i.lang.includes("🇧🇷");
                    });
                }
                const pages = Math.ceil(res.length / perPage) || 1;
                if(currentPage > pages) currentPage = 1;
                res.sort((a,b)=>{
                    if(ord==="az" || ord==="ptbr") return a.name.localeCompare(b.name);
                    if(ord==="za") return b.name.localeCompare(a.name);
                    return ord==="sizeAsc" ? pz(a.size)-pz(b.size) : pz(b.size)-pz(a.size);
                });
                return res;
            }

            function render() {
                const container = document.getElementById("ppsspp-card-container");
                if(container) container.innerHTML = at === "Todos" ? `<button id="dl-ppsspp" class="w-full py-4 bg-[#111] border border-[#22c55e] text-[#22c55e] rounded-xl font-bold italic tracking-widest flex items-center justify-center gap-2">🎮 BAIXAR PPSSPP</button>` : "";
                const dlBtn = document.getElementById("dl-ppsspp");
                if(dlBtn) dlBtn.onclick = () => showModal(ppssppStaticData.name, ppssppStaticData.link);
                const data = getFiltered();
                const start = (currentPage - 1) * perPage;
                const pageData = data.slice(start, start + perPage);
                const ct = document.getElementById("ct"); 
                if(!ct) return;
                ct.innerHTML = "";
                pageData.forEach(g => {
                    const info = (window.gamesInfo && window.gamesInfo[g.name]) || { description: "Sem descrição disponível.", compat: "Boa", lang: "🇺🇸" };
                    const card = document.createElement("div");
                    card.className = "bg-zinc-900/50 border border-zinc-800 p-4 rounded-2xl flex justify-between items-center cursor-pointer hover:border-[#ffA500] transition-all";
                    const safeName = g.name ? g.name.replace(/[<>]/g, "") : "Unknown Game";
                    card.innerHTML = `<div class=\"overflow-hidden flex-grow pr-2\"><h3 class=\"text-zinc-100 font-medium truncate\">${safeName}</h3><div class=\"flex gap-2 items-center mt-1\"><span class=\"text-[9px] bg-black text-[#ffA500] px-1.5 py-0.5 rounded border border-zinc-800 font-bold\">${g.size || "0MB"}</span><span class=\"text-[11px]\">${info.lang || "🇺🇸"}</span></div></div><div class=\"flex gap-4 items-center\"><button class=\"fav-btn text-xl active:scale-90 transition-transform\">${fv.has(g.name)?'❤️':'🤍'}</button><a href=\"${g.link || '#'}\" target=\"_blank\" class=\"dl-icon text-xl\">📥</a></div>`;
                    card.querySelector(".fav-btn").onclick = (e) => { e.stopPropagation(); toggleFav(g.name); };
                    card.querySelector(".dl-icon").onclick = (e) => { e.stopPropagation(); };
                    card.onclick = () => showModal(g.name, g.link);
                    ct.appendChild(card);
                });
                renderPagination(data.length);
            }

            function renderPagination(total) {
                const p = document.getElementById("pagination"); 
                if(!p) return;
                p.innerHTML = "";
                const pages = Math.ceil(total / perPage); 
                if(pages <= 1) return;
                for(let i = 1; i <= pages; i++){
                    const b = document.createElement("button"); 
                    b.innerText = i;
                    b.className = `px-3 py-1 rounded font-bold ${i === currentPage ? "bg-[#ffA500] text-white" : "bg-zinc-800 text-zinc-400"}`;
                    b.onclick = () => { currentPage = i; render(); window.scrollTo({top: 0, behavior: "smooth"}); };
                    p.appendChild(b);
                }
            }

            function showModal(n, l) {
                currentModalGame = n;
                const info = (n === ppssppStaticData.name) ? ppssppStaticInfo : (window.gamesInfo?.[n] || { description: "Sem descrição disponível.", release: "-", compat: "Boa", playtime: "-", lang: "🇺🇸" });
                const mt = document.getElementById("mt");
                const mds = document.getElementById("mds");
                const mrl = document.getElementById("mrl");
                const mdTime = document.getElementById("mdTime");
                const mdl = document.getElementById("mdl");
                const mdFav = document.getElementById("mdFav");
                const mcp = document.getElementById("mcp");
                const md = document.getElementById("md");
                if(mt) mt.innerText = (info.lang || "🇺🇸") + " " + n; 
                if(mds) mds.innerText = info.description || "...";
                if(mrl) mrl.innerText = "📅 " + (info.release || "-"); 
                if(mdTime) mdTime.innerText = "⏳ " + (info.playtime || "-");
                if(mdl) { mdl.href = l || "#"; mdl.className = "text-3xl"; }
                if(mdFav) {
                    mdFav.style.display = n === ppssppStaticData.name ? "none" : "block"; 
                    mdFav.className = "text-2xl active:scale-90 transition-transform";
                    mdFav.innerText = fv.has(n) ? "❤️" : "🤍"; 
                    mdFav.onclick = () => toggleFav(n);
                }
                if(mcp) {
                    mcp.innerText = info.compat || "Boa"; 
                    mcp.style.color = info.compat === "Perfeito" ? "#22c55e" : "#ffA500";
                    mcp.style.borderColor = info.compat === "Perfeito" ? "#22c55e" : "#ffA500";
                }
                if(md) md.style.display = "flex"; 
                document.body.classList.add("modal-open");
            }

            document.getElementById("s").oninput = () => { 
                clearTimeout(debounceTimer); 
                debounceTimer = setTimeout(() => { currentPage = 1; render(); }, 300); 
            };
            document.getElementById("btn-rnd").onclick = () => { 
                const f = getFiltered(); 
                if(f.length) { 
                    const r = f[Math.floor(Math.random() * f.length)]; 
                    showModal(r.name, r.link); 
                } 
            };
            window.addEventListener("scroll", () => {
                const up = document.getElementById("up");
                if(up) up.style.display = window.scrollY > 300 ? "flex" : "none";
            });
            document.getElementById("up").onclick = () => window.scrollTo({top: 0, behavior: "smooth"});

            function initCategories() {
                const t = document.getElementById("ts"); 
                if(!t) return;
                const cats = ["🗡️ Ação / Aventura", "🏎️ Corrida", "🏆 Esportes", "🥊 Luta", "🌍 Mundo Aberto / Sandbox", "🎮 Plataforma / Puzzle / Família", "🧙‍♂️ RPG / Ação", "🌾 Simulação / Vida", "🔫 Tiro (TPS/FPS)"];
                const counts = {}; 
                gs.forEach(g => { if(g.category) counts[g.category] = (counts[g.category] || 0) + 1; });
                let list = [{n: "Todos", c: gs.length}]; 
                if(fv.size > 0) list.push({n: "❤️ Favoritos", c: fv.size});
                cats.forEach(c => { if(counts[c]) list.push({n: c, c: counts[c]}); });
                t.innerHTML = "";
                list.forEach(item => {
                    const e = document.createElement("div"); 
                    const isSelected = item.n === at;
                    e.className = `px-5 py-2 rounded-full text-xs whitespace-nowrap cursor-pointer border transition-all ${isSelected ? "cat-selected" : "bg-zinc-900 text-zinc-500 border-zinc-800"}`;
                    e.innerHTML = `${item.n} <span class="ml-1 italic font-bold">(${item.c})</span>`;
                    e.onclick = () => { at = item.n; currentPage = 1; initCategories(); render(); };
                    t.appendChild(e);
                });
            }

            window.addEventListener("load", () => {
                initCategories(); 
                render();
                const loader = document.getElementById("loading-screen");
                const content = document.getElementById("app-content");
                const loadBox = document.getElementById("load-box");
                const loadingTimeout = setTimeout(() => {
                    if (loader && loader.style.display !== "none") {
                        if(loadBox) loadBox.style.display = "none";
                        loader.innerHTML = `
                            <h1 class="text-2xl font-black text-red-500 tracking-tighter italic">Erro de Conexão</h1>
                            <p class="text-zinc-400 text-sm mt-4 px-8">Os dados demoraram muito para carregar. Verifique sua internet.</p>
                            <button onclick="window.location.reload()" class="mt-6 bg-[#ffA500] text-black px-8 py-3 rounded-full font-bold uppercase tracking-widest text-xs">Tentar Novamente</button>
                            <a href="${instaUrl}" target="_blank" class="mt-4 text-zinc-500 font-bold uppercase tracking-widest text-[10px] hover:text-[#ffA500] transition-colors">Suporte</a>
                        `;
                    }
                }, 5000);
                if (window.gamesData && window.gamesData.length > 0) {
                    clearTimeout(loadingTimeout);
                    if(loader) loader.style.display = "none";
                    if(content) content.classList.remove("opacity-0");
                }
            });
        </script>
    </body>
</html>
