<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Orange Portable - Made By: @085_Teuzinnn</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <meta name="theme-color" content="#000000">
        <style>
            :root { --p:#ffA500; --c:#ffffff; }
            .hide-scroll { -ms-overflow-style:none; scrollbar-width:none; }
            .hide-scroll::-webkit-scrollbar { display:none; }
            .cat-selected { background-color:var(--p)!important;color:var(--c)!important;border-color:var(--p)!important;font-weight:bold; }
            .modal-open { overflow:hidden; }
            .option-card:active { background-color:#ffA500; color:white; }
            .btn-transition { transition: all 0.3s ease; }
        </style>
    </head>
    <body class="bg-black text-white flex flex-col min-h-screen">
        <div id="app-content" class="w-full flex flex-col p-4 md:p-8 text-center">
            <header class="mb-6">
                <h1 id="main-title" class="text-4xl font-black text-[#ffA500] tracking-tighter italic">Orange Portable</h1>
                <h2 id="sub-title" class="text-sm tracking-widest opacity-50 mt-1">Games CSO for PPSSPP</h2>
            </header>
            <section class="sticky top-0 z-40 bg-black/80 backdrop-blur-md pb-4 text-left flex gap-2">
                <input type="text" id="s" placeholder="🔍 Buscar jogo..." class="flex-grow bg-[#111] border border-zinc-800 p-4 rounded-xl outline-none text-lg focus:border-[#ffA500]">
                <button id="openSort" class="bg-[#111] border border-zinc-800 px-4 rounded-xl text-xl">⚙️</button>
            </section>
            <nav id="ts" class="flex gap-2 overflow-x-auto hide-scroll pb-4 mb-4"></nav>
            <button id="btn-rnd" class="w-full bg-[#111] border border-[#ffA500] text-[#ffA500] py-4 rounded-xl font-bold mb-3 active:scale-95 transition-transform italic tracking-widest">🎲 ME SURPREENDA!</button>
            <div id="ppsspp-card-container" class="mb-6"></div>
            <main id="ct" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3 flex-grow text-left"></main>
            <div id="pagination" class="flex justify-center gap-2 mt-6"></div>
            <section class="mt-12 p-6 bg-zinc-950 border border-zinc-900 rounded-3xl">
                <div class="grid grid-cols-2 gap-3">
                    <button id="pix" class="bg-[#22c55e] py-4 rounded-2xl font-bold text-white text-[10px] sm:text-xs btn-transition">​🍊 Orange Pix</button>
                    <button id="openSOS" class="bg-[#22c55e] py-4 rounded-2xl font-bold text-white text-[10px] sm:text-xs">🍊 Orange SOS</button>
                </div>
            </section>
            <footer class="mt-10 mb-20 text-gray-500 text-sm">
                <p class="font-semibold italic">Made By: @085_Teuzinnn</p>
                <p class="mt-2 opacity-70">© 2026 - All Rights Reserved</p>
            </footer>
            <button id="up" class="fixed bottom-6 right-6 w-12 h-12 rounded-full hidden z-50 text-xl items-center justify-center bg-zinc-900 border border-zinc-800 shadow-xl">🆙️</button>
        </div>
        <div id="md" class="fixed inset-0 z-[60] bg-black/95 hidden items-center justify-center p-4">
            <div class="bg-[#111] border border-[#ffA500] w-full max-w-md p-8 rounded-3xl relative">
                <button onclick="closeAllModals()" class="absolute top-4 right-4 text-zinc-500 text-xl p-2">✕</button>
                <h2 id="mt" class="text-2xl font-bold text-[#ffA500] mb-4 pr-6"></h2>
                <div class="flex gap-3 mb-4"><span id="mdTime" class="text-[10px] bg-zinc-800 px-2 py-1 rounded font-bold"></span><span id="mrl" class="text-zinc-400 text-[10px] font-bold pt-1"></span></div>
                <p id="mds" class="text-zinc-400 text-sm leading-relaxed mb-6"></p>
                <div class="flex items-center justify-between pt-4 border-t border-zinc-800">
                    <span id="mcp" class="text-[10px] font-black border px-2 py-0.5 rounded tracking-tighter"></span>
                    <div class="flex gap-4 items-center">
                        <button id="mdFav" class="text-2xl active:scale-90 transition-transform"></button>
                        <a id="mdl" href="#" target="_blank" class="text-3xl">📥</a>
                    </div>
                </div>
            </div>
        </div>
        <div id="modalGeneric" class="fixed inset-0 z-[70] bg-black/95 hidden items-center justify-center p-4">
            <div class="bg-[#111] border border-zinc-800 w-full max-w-md max-h-[80vh] flex flex-col rounded-3xl relative overflow-hidden">
                <div class="p-6 border-b border-zinc-800 flex justify-between items-center bg-[#111]">
                    <h2 id="genericTitle" class="text-xl font-bold text-[#ffA500]"></h2>
                    <button onclick="closeAllModals()" class="text-zinc-500 text-xl">✕</button>
                </div>
                <div id="genericContent" class="overflow-y-auto p-4 space-y-2"></div>
            </div>
        </div>
        <script src="database.js"></script>
        <script src="infobase.js"></script>
        <script>
            const ppssppStaticData = { name: "PPSSPP", size: "20-80 MB", link: "https://www.ppsspp.org/download/" };
            const ppssppStaticInfo = { description: "O melhor emulador de PSP para Android e PC.", release: "01/11/2012", compat: "Perfeito", playtime: "Infinito", lang: "🌐" };
            const gs = window.gamesData || [];
            let fv = new Set();
            try { const s = JSON.parse(localStorage.getItem("fav")); if(Array.isArray(s)) fv = new Set(s); } catch(e){}
            let at="Todos", currentPage=1, perPage=20, ord="az", debounceTimer, currentModalGame = "";
            function pz(s) { if(!s||typeof s!=="string") return 0; const n=parseFloat(s.replace(",",".")); return s.toUpperCase().includes("GB")?n*1024:n; }
            function closeAllModals() { 
                document.getElementById("md").style.display="none"; 
                document.getElementById("modalGeneric").style.display="none"; 
                document.body.classList.remove("modal-open");
                currentModalGame = "";
            }
            function openGeneric(title, items) {
                document.getElementById("genericTitle").innerText = title;
                const container = document.getElementById("genericContent");
                container.innerHTML = "";
                items.forEach(item => {
                    const b = document.createElement("button");
                    b.className = "w-full text-left p-4 rounded-2xl bg-zinc-900 border border-zinc-800 text-sm font-medium option-card transition-colors";
                    b.innerText = item.label;
                    b.onclick = () => { item.action(); closeAllModals(); };
                    container.appendChild(b);
                });
                document.getElementById("modalGeneric").style.display = "flex";
                document.body.classList.add("modal-open");
            }
            document.getElementById("openSort").onclick = () => {
                openGeneric("Organizar por:", [
                    { label: "🔠 A-Z", action: () => { ord="az"; render(); } },
                    { label: "🔡 Z-A", action: () => { ord="za"; render(); } },
                    { label: "🇧🇷 Traduzidos", action: () => { ord="ptbr"; render(); } },
                    { label: "📉 Menor Tamanho", action: () => { ord="sizeAsc"; render(); } },
                    { label: "📈 Maior Tamanho", action: () => { ord="sizeDesc"; render(); } }
                ]);
            };
            document.getElementById("openSOS").onclick = () => {
                const sosOptions = [
                    { label: "Suporte Profissional", msg: "Olá! Estou navegando no Orange Portable e preciso de suporte técnico em relação aos arquivos." },
                    { label: "Pedido de Jogo", msg: "Olá, Teuzin! Gostaria de sugerir a inclusão de um novo jogo que não encontrei na lista atual." },
                    { label: "Link Offline", msg: "Identifiquei um link que parece estar fora do ar. Poderia verificar a disponibilidade deste download?" },
                    { label: "Ajuda na Instalação", msg: "Preciso de ajuda para configurar um jogo no PPSSPP. Algumas texturas não estão carregando corretamente." },
                    { label: "Feedback do Site", msg: "Passando para dar um feedback positivo! O site está excelente e os jogos funcionando perfeitamente." },
                    { label: "Parceria", msg: "Olá! Tenho interesse em conversar sobre possíveis parcerias ou divulgação do projeto Orange Portable." },
                    { label: "Reportar Bug", msg: "Encontrei um comportamento estranho na interface do site ao usar o meu navegador. Gostaria de reportar." },
                    { label: "Problema de Performance", msg: "Alguns jogos estão com queda de FPS. Existe alguma configuração recomendada para o meu dispositivo?" },
                    { label: "Suporte VIP / Pix", msg: "Acabei de realizar um Orange Pix e gostaria de confirmar se o valor caiu para ajudar o projeto!" },
                    { label: "Ajuda Rápida", msg: "Suporte, preciso de uma ajuda rápida com um dos jogos da lista." }
                ];
                openGeneric("Como podemos ajudar?", sosOptions.map(opt => ({
                    label: opt.label,
                    action: () => { window.open(`https://wa.me/5585991272125?text=${encodeURIComponent("🚀 Orange SOS\n\n" + opt.msg)}`, "_blank"); }
                })));
            };
            document.getElementById("pix").onclick = function() {
                const btn = this;
                const originalText = "​🍊 Orange Pix";
                const numberToCopy = "85991272125";
                if (window.AndroidJS && window.AndroidJS.copiarPix) {
                    window.AndroidJS.copiarPix(numberToCopy);
                } else {
                    navigator.clipboard.writeText(numberToCopy);
                }
                btn.innerText = "📋 Copiado!";
                btn.style.backgroundColor = "#16a34a";
                window.location.href = "picpay://";
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.backgroundColor = "#22c55e";
                }, 1000);
            };
            function toggleFav(n) { 
                if(fv.has(n)) fv.delete(n); 
                else fv.add(n); 
                localStorage.setItem("fav",JSON.stringify([...fv])); 
                if(currentModalGame === n) {
                    document.getElementById("mdFav").innerText = fv.has(n) ? "❤️" : "🤍";
                }
                initCategories(); 
                render(); 
            }
            function getFiltered() {
                const q=document.getElementById("s").value.toLowerCase();
                let res = gs.filter(g => g.name.toLowerCase().includes(q) && (at==="Todos" || (at==="❤️ Favoritos" ? fv.has(g.name) : g.category===at)));
                if(ord==="ptbr") {
                    res = res.filter(g => {
                        const i = window.gamesInfo && window.gamesInfo[g.name];
                        return i && i.lang && i.lang.includes("🇧🇷");
                    });
                }
                res.sort((a,b)=>{
                    if(ord==="az" || ord==="ptbr") return a.name.localeCompare(b.name);
                    if(ord==="za") return b.name.localeCompare(a.name);
                    return ord==="sizeAsc" ? pz(a.size)-pz(b.size) : pz(b.size)-pz(a.size);
                });
                return res;
            }
            function render() {
                const container = document.getElementById("ppsspp-card-container");
                container.innerHTML = at === "Todos" ? `<button onclick="showModal('${ppssppStaticData.name}','${ppssppStaticData.link}')" class="w-full bg-[#111] border border-[#22c55e] text-[#22c55e] py-4 rounded-xl font-bold italic tracking-widest flex items-center justify-center gap-2">BAIXAR PPSSPP</button>` : "";
                const data=getFiltered(), start=(currentPage-1)*perPage, pageData=data.slice(start,start+perPage);
                const ct=document.getElementById("ct"); ct.innerHTML="";
                pageData.forEach(g=>{
                    const i=(window.gamesInfo && window.gamesInfo[g.name]) || { description:"...", compat:"Boa", lang:"🇺🇸" };
                    const card=document.createElement("div");
                    card.className="bg-zinc-900/50 border border-zinc-800 p-4 rounded-2xl flex justify-between items-center cursor-pointer hover:border-[#ffA500] transition-all";
                    card.innerHTML=`<div class="overflow-hidden"><h3 class="text-zinc-100 font-medium truncate pr-2">${g.name}</h3><div class="flex gap-2 items-center mt-1"><span class="text-[9px] bg-black text-[#ffA500] px-1.5 py-0.5 rounded border border-zinc-800 font-bold">${g.size}</span><span class="text-[11px]">${i.lang}</span></div></div><div class="flex gap-4 items-center"><button onclick="event.stopPropagation();toggleFav('${g.name}')" class="text-xl active:scale-90 transition-transform">${fv.has(g.name)?'❤️':'🤍'}</button><a href="${g.link}" target="_blank" onclick="event.stopPropagation()" class="text-xl">📥</a></div>`;
                    card.onclick=()=>showModal(g.name,g.link);
                    ct.appendChild(card);
                });
                renderPagination(data.length);
            }
            function renderPagination(total) {
                const p=document.getElementById("pagination"); p.innerHTML="";
                const pages=Math.ceil(total/perPage); if(pages<=1) return;
                for(let i=1;i<=pages;i++){
                    const b=document.createElement("button"); b.innerText=i;
                    b.className=`px-3 py-1 rounded font-bold ${i===currentPage?"bg-[#ffA500] text-white":"bg-zinc-800 text-zinc-400"}`;
                    b.onclick=()=>{ currentPage=i; render(); window.scrollTo({top:0,behavior:"smooth"}); };
                    p.appendChild(b);
                }
            }
            function showModal(n,l) {
                currentModalGame = n;
                const i = (n===ppssppStaticData.name) ? ppssppStaticInfo : (window.gamesInfo[n] || { description:"...", release:"-", compat:"Boa", playtime:"-", lang:"🇺🇸" });
                document.getElementById("mt").innerText=i.lang+" "+n; 
                document.getElementById("mds").innerText=i.description;
                document.getElementById("mrl").innerText="📅 "+i.release; 
                document.getElementById("mdTime").innerText="⏳ "+i.playtime;
                document.getElementById("mdl").href=l||"#";
                const fBtn=document.getElementById("mdFav"); 
                fBtn.style.display=n===ppssppStaticData.name?"none":"block"; 
                fBtn.innerText=fv.has(n)?"❤️":"🤍"; 
                fBtn.onclick=()=>toggleFav(n);
                const cp=document.getElementById("mcp"); 
                cp.innerText=i.compat; 
                cp.style.color=i.compat==="Perfeito"?"#22c55e":"#ffA500";
                document.getElementById("md").style.display="flex"; 
                document.body.classList.add("modal-open");
            }
            document.getElementById("s").oninput=()=>{ clearTimeout(debounceTimer); debounceTimer=setTimeout(()=>{ currentPage=1; render(); },300); };
            document.getElementById("btn-rnd").onclick=()=>{ const f=getFiltered(); if(f.length) { const r = f[Math.floor(Math.random()*f.length)]; showModal(r.name, r.link); } };
            window.onscroll=()=>{ document.getElementById("up").style.display=window.scrollY>300?"flex":"none"; };
            document.getElementById("up").onclick=()=>window.scrollTo({top:0,behavior:"smooth"});
            function initCategories() {
                const t=document.getElementById("ts"); t.innerHTML="";
                const cats=["🗡️ Ação / Aventura","🏎️ Corrida","🏆 Esportes","🥊 Luta","🌍 Mundo Aberto / Sandbox","🎮 Plataforma / Puzzle / Família","🧙‍♂️ RPG / Ação","🌾 Simulação / Vida","🔫 Tiro (TPS/FPS)"];
                const counts={}; gs.forEach(g=>counts[g.category]=(counts[g.category]||0)+1);
                let list=[{n:"Todos",c:gs.length}]; if(fv.size>0) list.push({n:"❤️ Favoritos",c:fv.size});
                cats.forEach(c=>{ if(counts[c]) list.push({n:c,c:counts[c]}) });
                list.forEach(item=>{
                    const e=document.createElement("div"); e.className=`px-5 py-2 rounded-full text-xs whitespace-nowrap cursor-pointer border transition-all ${item.n===at?"cat-selected":"bg-zinc-900 text-zinc-500 border-zinc-800"}`;
                    e.innerHTML=`${item.n} <span class="ml-1 italic font-bold">(${item.c})</span>`;
                    e.onclick=()=>{ at=item.n; currentPage=1; initCategories(); render(); };
                    t.appendChild(e);
                });
            }
            document.addEventListener("DOMContentLoaded", () => { initCategories(); render(); });
        </script>
    </body>
</html>
